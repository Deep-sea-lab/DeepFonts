name: Build and Deploy to netlify Branch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      id-token: write

    env:
      NODE_OPTIONS: "--max-old-space-size=4096"  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build:cdn

      - name: Deploy to netlify branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          clean: true
          publish_branch: netlify
